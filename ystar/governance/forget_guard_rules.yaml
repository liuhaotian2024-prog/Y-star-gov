# ForgetGuard Rules Schema v0.42
# Detects agents forgetting organizational principles/hierarchy/constraints after session restart

rules:
  - name: ceo_direct_engineer_dispatch
    pattern: "ceo task eng-"
    mode: deny
    message: "CEO直接派代码任务给工程师。按第三条（hierarchy discipline），必须经CTO分工。"
    rationale: "AGENTS.md Article 3 — CEO coordinates C-suite, CTO manages engineers. Direct CEO→engineer dispatch bypasses technical leadership and breaks delegation chain."
    dry_run_until: null  # null = immediately enforce; set to Unix timestamp for grace period
    created_at: "2026-04-13T16:30:00Z"

  - name: ceo_skip_gov_dispatch
    pattern: "(?i)(agent.*eng-|dispatch.*eng-|spawn.*eng-)(?!.*DISPATCH:)"
    mode: deny
    message: "CEO派工程任务缺失 gov_dispatch token。必须先调用 gov_dispatch MCP tool 获取 token，再在 Agent prompt 里包含 [DISPATCH:token]。"
    rationale: "WORKING_STYLE.md 第十二条 + .claude/agents/ceo.md Dispatch Gate Protocol — 防止 CEO 绕过 CTO 审批直接派代码任务。所有工程 dispatch 必须经 gov_dispatch MCP 工具生成 token。"
    dry_run_until: null
    created_at: "2026-04-15T14:00:00Z"

  - name: task_dispatch_without_y_star
    pattern: "(?i)\\b(task|dispatch|mission|directive)\\s*[:\\-](?!.*(Y\\*|Y\\s*\\*|理想契约))"
    mode: deny
    message: "任务 dispatch 缺失 CIEU 5-tuple (Y*/Xt/U/Yt+1/Rt+1)。按 WORKING_STYLE.md 第十二条，所有任务必须包含 Y* 理想契约定义。"
    rationale: "WORKING_STYLE.md 第十二条 CIEU 任务工作法 + Board Iron Rule 1.6 — 防止 agent 绕过 5-tuple 格式回到'印象驱动执行'。Y* 缺失 = 无验证标准 = 不可审计。"
    dry_run_until: 1744750800  # 2026-04-22 00:00:00 UTC — 7-day grace period for ecosystem adaptation
    created_at: "2026-04-15T14:00:00Z"

  - name: defer_language
    pattern: "(?i)(明日|tomorrow morning|等会儿|晚些|以后再|改天|明晚|tomorrow|queued for|next session|明早|wait for|稍后|later|下周|next week)"
    mode: deny
    message: "Defer language detected. Only explicit Board 'stop' / '收工' permits deferral. Otherwise execute now, spawn sub-agent (Article 11), or ask Board explicitly."
    rationale: "feedback_no_clock_out.md — Unilateral deferral violates autonomous operation principle. Board expects work to continue until explicit stop signal."
    dry_run_until: null
    created_at: "2026-04-15T20:00:00Z"

  - name: choice_question_to_board
    pattern: "(?i)(Option A|Option B|请选择|1\\)|2\\)|3\\)|方案一|方案二)"
    mode: deny
    message: "Choice questions to Board are PROHIBITED. CEO must make unilateral decisions and execute. Board will override if wrong."
    rationale: "CLAUDE.md 硬约束 + AGENTS.md CEO role — Choice questions block autonomous operation. Unattended systems cannot answer 'pick 1/2/3' questions."
    dry_run_until: null
    created_at: "2026-04-15T20:00:00Z"

  - name: defer_language_in_commit_msg
    pattern: "(?i)git commit.*(-m|--message).*['\"].*?(明日|tomorrow morning|等会儿|晚些|以后再|改天|明晚|明早|tomorrow|next session|queued for|wait for|稍后|later|下周|next week)"
    mode: deny
    message: "禁止在 commit message 中使用 defer 语义词汇。Commit 表示'已完成落盘'，与'明日/queued/稍后'语义冲突。"
    rationale: "feedback_no_clock_out.md — Commit messages must reflect actual completion state [LX], not future intent."
    dry_run_until: null

  - name: enforcement_gap_persistent
    pattern: "(?i)(enforcement.*gap|gap.*enforcement|rule.*not.*enforced|violation.*recur)"
    mode: warn
    message: "Enforcement gap detected in ≥2 consecutive observer scans. Auto-Enforcement Meta-Observer recommends runtime ForgetGuard rule creation."
    rationale: "governance/auto_enforce_meta.md C1 recurrence criterion — Persistent enforcement gaps with ≥3 criteria met should trigger automated ForgetGuard rule generation (warn mode, review before deny)."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h observation period (AI 1 day ≈ human 1 year)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h is the human-equivalent of ~year-long observation."
    created_at: "2026-04-16T08:00:00Z"
    helper_script: "ystar/governance/enforcement_observer.py::scan_pending_enforcement_candidates"

  - name: defer_language_in_echo
    pattern: "(?i)echo.*['\"].*?(明日|tomorrow morning|等会儿|晚些|以后再|改天|明晚|明早|tomorrow|next session|queued for|wait for|稍后|later|下周|next week)"
    mode: deny
    message: "禁止 echo defer 语义到 Board 可见输出（如 reports/、session_close 等）。Board 期望自主执行，defer 语义违反 autonomous operation 原则。"
    rationale: "feedback_no_clock_out.md — Output to Board must reflect immediate action or explicit escalation, not unilateral deferral."
    dry_run_until: null
    created_at: "2026-04-15T20:00:00Z"

  - name: czl_dispatch_missing_5tuple
    pattern: "(?i)(Agent.*prompt|dispatch.*sub-agent|spawn.*eng-)"
    mode: deny
    message: "CZL Gate 1 violation: dispatch lacks 5-tuple structure (Y*/Xt/U/Yt+1/Rt+1). Call czl_protocol.validate_dispatch() before Agent tool spawn."
    rationale: "CZL Unified Communication Protocol v1.0 — Gate 1 enforcement prevents impression-driven dispatch. All CEO/CTO → sub-agent tasks must include Y* (verifiable contract), Xt (tool-measured pre-state), U (concrete actions ≤15), Yt+1 (post-state verification), Rt+1 (gap target 0). Ref: ystar/kernel/czl_protocol.py, Board 2026-04-16 Constitutional."
    dry_run_until: null
    created_at: "2026-04-16T02:00:00Z"
    validator: czl_protocol.validate_dispatch
    validator_kwargs:
      check_speculation: true
      max_tool_uses: 15

  - name: czl_receipt_rt_not_zero
    pattern: "(?i)(sub-agent.*return|receipt.*Rt\\+1|完成.*5-tuple)"
    mode: deny
    message: "CZL Gate 2 violation: receipt claims Rt+1=0 but empirical verification failed (artifacts missing or tests failed). Call czl_protocol.validate_receipt() after sub-agent return."
    rationale: "CZL Unified Communication Protocol v1.0 — Gate 2 enforcement rejects hallucinated success via empirical file checks. Receipt rt_value must match actual artifact existence + test pass counts. Prevents CZL-1 class of zero-tool hallucination. Ref: ystar/kernel/czl_protocol.py validate_receipt(), Board 2026-04-16 Constitutional."
    dry_run_until: null
    created_at: "2026-04-16T02:00:00Z"
    validator: czl_protocol.validate_receipt
    validator_kwargs:
      verify_artifacts: true
      verify_bash_output: true

  - name: realtime_artifact_archival_sla
    pattern: "(?i)(new file:|created:|wrote:).*\\b(reports/|knowledge/|products/|content/|governance/).*(?!.*ARCHIVE_INDEX)"
    mode: audit
    message: "New artifact created in archival scope (reports/knowledge/products/content/governance). Secretary SLA: index in knowledge/ARCHIVE_INDEX.md ≤30 min + emit ARTIFACT_ARCHIVED. Automated scan: scripts/archive_sla_scan.py (cron)."
    rationale: "agents/Secretary.md §CZL duties item 6 — real-time artifact archival SLA. Automated enforcement via cron + CIEU breach emission prevents knowledge drift from passive forgetting."
    dry_run_until: null
    created_at: "2026-04-16T06:00:00Z"

  - name: ceo_deferred_dispatch_promise_orphan
    pattern: "(?i)(下波派|后续调起|next round (spawn|dispatch)|next dispatch via|等.{1,8}完成.{1,8}(派|spawn|调起))"
    mode: warn
    message: "CEO/CTO deferred-dispatch promise without same-reply Agent call. Forbidden: '下波派 X', 'next round spawn Y', '后续调起 Z' as tail promises. FIX: (1) Spawn NOW if ready, (2) Create .claude/tasks/ card (no verbal promise), (3) WORLD_STATE.md backlog (no '下波' language). Constitutional: Unified Work Protocol Article 2.3 — '反 pattern: 推别的 / 推下一个 / 换到 / defer'."
    rationale: "Board 2026-04-16 P0 forensic (reports/cto/ceo_deferred_dispatch_root_cause_20260416.md) — CEO exhibits systematic promise hypocrisy (≥3 violations today, 100% orphan rate). Root cause: reply-tail attention dropout + Chinese passive voice + cognitive load overflow. Structural fix: deny future-tense dispatch promises, enforce same-reply execution or explicit backlog."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h pending tier-routing migration completion
    dry_run_rationale: "CZL-77 requires tier-routing context propagation for accurate session_recent_actions tracking. Until shipped, rule runs in warn mode (audit-only) to collect violation patterns without blocking CEO workflow. Auto-upgrade to deny mode after 48h (AI 1 day ≈ human 1 year observation cycle)."
    created_at: "2026-04-16T10:00:00Z"
    helper_script: "ystar/governance/coordinator_audit.py::check_deferred_dispatch_orphan"

  - name: coordinator_summary_rt_audit
    pattern: "(?i)(收敛|complete|全部\\s*done|wave\\s*.*shipped|全部\\s*verified|all\\s+green|fully\\s+resolved|landing\\s+complete|所有.*完成)"
    mode: warn
    message: "CZL Meta-Gate violation: coordinator (CEO/CTO) claimed closure (detected phrase: '{claim_phrase}') while {pending_count} unjustified pending tasks exist (IDs: {unjustified_pending_ids}). Call coordinator_audit.check_summary_rt_drift() before summary reply."
    rationale: "Board 2026-04-16 meta-fix — Gate 2 only validated per-receipt Rt+1, not coordinator-level summaries. CEO wrote 'wave 完整收敛' while TaskList held 12+ pending → undetected drift. Closure claims must have actual Rt+1=0 (zero unjustified pending). Coordinator replies require same rigor as sub-agent receipts. Ref: ystar/governance/coordinator_audit.py, CZL Unified Communication Protocol v1.0."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h warn-only observation (AI 1 day ≈ human 1 year)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h is the human-equivalent of ~year-long observation."
    created_at: "2026-04-16T07:00:00Z"
    helper_script: "ystar/governance/coordinator_audit.py::check_summary_rt_drift"

  - name: subagent_tool_uses_claim_mismatch
    pattern: "(?i)tool[_ -]?(uses?|calls?)\\s*[:：]\\s*(\\d+)"
    mode: warn
    message: "Sub-agent receipt tool_uses claim does not match metadata (diff ≥2). Call claim_mismatch.detect_tool_uses_mismatch() to validate. Examples: sub-agent C3 (claim 13, metadata 38), sub-agent C2 (claim 14, metadata 24), sub-agent B3 (claim 9, metadata 22), sub-agent #CZL-1 (claim 9, metadata 0). Severity: hallucination (claim > actual), omission (claim < actual), zero_tool_hallucination (claim > 0, actual = 0)."
    rationale: "E1 priority enforcement (Board 2026-04-16) — Sub-agent receipt must honestly reflect tool_uses count. Drift ≥2 indicates either hallucinated completion (claim > actual) or omitted work acknowledgment (claim < actual). CZL-1 zero-tool hallucination class = most severe. Ref: ystar/governance/claim_mismatch.py detect_tool_uses_mismatch()."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h grace for ecosystem adaptation (AI 1 day ≈ human 1 year)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h is the human-equivalent of ~year-long observation."
    created_at: "2026-04-16T11:00:00Z"

  - name: charter_drift_mid_session
    pattern: "(?i)(AGENTS\\.md|CLAUDE\\.md|governance/.*\\.md|\\.claude/agents/.*\\.md)"
    mode: warn
    message: "Charter file modified mid-session detected. File mtime > session_start_ts indicates silent constitutional drift risk. Call charter_drift.detect_charter_drift() to enumerate drifted files + emit CIEU CHARTER_DRIFT_DETECTED per file with mtime delta + git diff --stat. Recommendation: hot-reload modified files or schedule session restart to re-ingest charter changes."
    rationale: "I1 Priority (Board 2026-04-16 K9-RT Discussion) — Mid-session charter changes create silent context drift. Agent continues operating under stale constitutional constraints while charter evolves. Detection enables: (1) hot-reload warning to Board, (2) CIEU audit trail for governance forensics, (3) graceful session restart trigger. Reference charter scope: AGENTS.md, CLAUDE.md, governance/*.md, .claude/agents/*.md. Ref: ystar/governance/charter_drift.py detect_charter_drift()."
    dry_run_until: null  # Immediate enforcement (warn only, non-blocking)
    created_at: "2026-04-16T15:00:00Z"
    validator: charter_drift.detect_charter_drift
    validator_kwargs:
      session_start_ts: auto  # Daemon reads from .ystar_session.json["session_start_time"]
    validator: claim_mismatch.detect_tool_uses_mismatch
    validator_kwargs:
      # validator receives (receipt_text, metadata_tool_uses) from harness
      # returns dict {claimed, actual, diff, severity} or None

  - name: wave_scope_undeclared
    pattern: "(?i)(wave|本批|本轮).*?(收敛|complete|全部\\s*done|shipped|verified|all\\s+green|fully\\s+resolved|landing\\s+complete|所有.*完成)"
    mode: warn
    message: "Wave/batch closure claim lacks explicit TaskID scope declaration. Detected wave-language ('{wave_term}') + closure-language ('{closure_term}') but no TaskID list (missing pattern: '#\\d+' or 'task[_\\s]?id'). Call coordinator_audit.check_wave_scope_declared() before wave-level summary reply."
    rationale: "Board 2026-04-16 batch drift fix — Prose wave closure (e.g., 'wave shipped') without explicit TaskID enumeration creates ambiguous scope. Sub-agents cannot verify which tasks are actually claimed complete. Requires explicit '#123, #124, #125' or equivalent task_id list in same paragraph as closure claim. Extension to coordinator_summary_rt_audit pattern."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h observation period (AI 1 day ≈ human 1 year)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h is the human-equivalent of ~year-long observation."
    created_at: "2026-04-16T20:00:00Z"
    helper_script: "ystar/governance/coordinator_audit.py::check_wave_scope_declared"

  - name: subagent_unauthorized_git_op
    pattern: "git\\s+(commit|push|add|reset|merge|rebase)"
    mode: warn
    message: "Sub-agent (agent_id={agent_id}) attempted git operation: '{matched_command}'. Board Decision Rule (CLAUDE.md): code merges require Board confirmation. Sub-agents must not perform git operations unless deliverable explicitly authorizes. CEO/CTO are accountable for git op authorization."
    rationale: "Board 2026-04-16 K9 forensic trace — A sub-agent (d2852174) committed 53 files uncaught. Existing rules only checked commit message content, not actor × command matrix. Sub-agents performing git ops without explicit authorization violates Board Decision Rule: 'All external releases, code merges, and actual payments require manual confirmation.' This rule enforces actor-level constraint: only CEO/CTO may perform git operations unless sub-agent task deliverable contains explicit 'you may commit' token."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h grace period for explicit authorization pattern adoption
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h allows ecosystem to adopt explicit authorization tokens in task deliverables before deny enforcement."
    created_at: "2026-04-16T16:00:00Z"
    scope:
      agent_ids:
        - eng-platform
        - eng-kernel
        - eng-governance
        - eng-domains
        - secretary
        - ethan-cto
        - sofia-cmo
        - zara-cso
        - marco-cfo

  - name: ceo_dispatch_missing_self_check
    pattern: "(?i)(Agent.*tool|spawn.*sub-?agent|dispatch.*eng-|dispatch.*ethan|dispatch.*sofia|dispatch.*zara|dispatch.*marco)"
    mode: warn
    message: "CEO Agent tool dispatch missing Self-Check 3-question markers. Before dispatching sub-agent, CEO must validate: (1) ≤1 deliverable? (2) ≤15 tool_uses? (3) context complete (file paths, deps, Rt+1 definition)? Pattern should include 'Self-Check' / 'self_check' / 3-question structure in same reply as Agent call."
    rationale: "Universal audit Q1 priority enforcement (Board 2026-04-16) — CEO dispatch without self-check risks multi-task disguise (sub-agent #5 a8dd03b6, 6 tasks → 0 ship) + race dispatch (sub-agent #5 a0af160b, redundant commit). Recipe: governance/ceo_dispatch_self_check.md requires CEO validate 3 criteria before Agent tool. Detection: Agent call by ceo agent_id without 'self-check' keyword or 3-question markers in surrounding text."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h observation period (AI 1 day ≈ human 1 year)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h allows ecosystem to adopt explicit self-check pattern before escalation."
    created_at: "2026-04-16T23:00:00Z"
    scope:
      agent_ids:
        - ceo
    recipe_doc: "governance/ceo_dispatch_self_check.md"

  - name: defer_disguised_as_schedule
    pattern: "(?i)(明天|tomorrow|稍后|later|next\\s+session|wait\\s+for|稍候|改天|晚些|下周|next\\s+week).*?\\b(再|will|then|later|等)\\b"
    mode: warn
    message: "Detected time-word + shirk-verb combo (defer disguised as schedule). Pattern: '{matched_phrase}'. Per MEMORY feedback_defer_vs_schedule_distinction, time words alone are OK (e.g., '明天09:00 cron run'), but time+shirk combo = forbidden defer. CEO/CTO must execute now, spawn sub-agent, or escalate to Board — not unilaterally defer."
    rationale: "Universal audit Q6 priority enforcement (Board 2026-04-16) — MEMORY rule 'defer ≠ schedule' had no automated detector. Time-only phrases ('明天09:00', 'tomorrow morning') pass as legitimate schedule; time+shirk combos ('明天再做', 'later will handle') violate autonomous operation principle. Rule disambiguates feedback_no_clock_out (blanket defer ban) from legitimate scheduling."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h observation period (AI 1 day ≈ human 1 year)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h allows agents to learn time-only vs time+shirk distinction."
    created_at: "2026-04-16T23:00:00Z"
    scope:
      agent_ids:
        - ceo
        - ethan-cto

  - name: methodology_hardcoded_cadence
    pattern: "(?i)\\b(weekly|monthly|quarterly|sprint|biweekly|fortnight|annual|24h|workday|每周|每月|每季|每天|Week\\s*\\d+)\\b"
    mode: warn
    message: "Methodology contains hardcoded calendar cycle: '{matched_phrase}'. Per MEMORY feedback_methodology_no_human_time_grain, methodology/dispatch/receipt must use dependency-sequence + event-trigger language ONLY. Forbidden: weekly, monthly, quarterly, sprint, biweekly, fortnight, annual, 24h, workday, 每周, 每月, 每季, 每天, Week N. Required: 'after N atomic completions', 'after Board directive', 'when X event occurs', 'triggered by Y'. Call coordinator_audit.check_hardcoded_cadence() before methodology/dispatch/receipt finalization."
    rationale: "Board 2026-04-16 sharpened methodology constraint — 0 hardcoded human time-grain cycles permitted. Today CZL-69 (weekly ritual), CZL-72 (5pt-week), CZL-74 (6h estimate), CZL-76 (Week 1-4 timeline) leaked calendar cycles because no automated detector existed. Structural fix: ForgetGuard rule blocks time-grain regardless of justification. Methodology must use dependency-sequence (after N atomic completions) + event-trigger (when OmissionEngine fires) language exclusively. Ref: ystar/governance/coordinator_audit.py check_hardcoded_cadence(), MEMORY feedback_methodology_no_human_time_grain."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h observation period (AI 1 day ≈ human 1 year, auto-promote to deny)
    dry_run_rationale: "AI iteration cycle: 1 day = ~1 year human time. 48h is the human-equivalent of ~year-long observation. Auto-promote to deny after dry_run_until expiry."
    created_at: "2026-04-17T00:00:00Z"
    helper_script: "ystar/governance/coordinator_audit.py::check_hardcoded_cadence"

  # ── Threshold-Tuned Rules (CZL-103 Cross-Validation) ───────────────

  - name: phantom_variable
    pattern: "^(?!.*(comment|doc|#)).*\\b(phantom|undefined)\\s*="
    mode: warn
    message: "Phantom variable assignment detected in file_write/bash_command context: '{matched_phrase}'. Potential uninitialized variable or AST-level binding error. Rule demoted to warn per CZL-103 cross-validation (98% FP rate in broad pattern). Tightened scope: file_write/bash_command only, AST-level assignment pattern, excludes comments/docs."
    rationale: "CZL-103 empirical cross-validation (2026-04-16) — Original phantom_variable detector had 98% FP rate (489 total, 10 TP, 479 FP) due to overly broad pattern triggering on prose 'phantom' keyword in docs/comments. TUNING: (1) Narrow scope to file_write + bash_command contexts only (exclude file_read/external_observation), (2) Refine pattern to AST-level assignment (e.g., 'x = phantom_value'), (3) Demote deny→warn until pattern refined. 7-day corpus analysis: deny precision 2% unacceptable, warn mode until ≥80% TP rate achieved."
    dry_run_until: 1776672000  # 2026-04-20T08:00:00Z — 72h warn-mode observation, promote to deny if TP rate ≥80%
    dry_run_rationale: "72h warn mode (AI 1.5 day ≈ human 1.5 year) allows pattern validation via production corpus. Auto-promote to deny after 72h if TP rate ≥80% in next cross-validation scan."
    created_at: "2026-04-16T20:00:00Z"
    scope:
      action_types: [file_write, bash_command]
    tuning_decision: "Demote deny→warn + narrow scope (file_write/bash_command only) + tighten pattern (AST assignment, exclude comments/docs). 98% FP rate → target ≤20% FP after tuning."
    cross_validation_report: "reports/governance/enforcement_threshold_cross_validation_20260416.md"

  - name: root_cause_fix_required
    pattern: "(?i)\\b(fix|patch|workaround)\\b.*\\b(kernel/|governance/)\\b"
    mode: deny
    message: "Root cause fix required: detected fix/patch/workaround in high-severity scope (kernel/ or governance/). Recurrence threshold: ≥2 occurrences in 48h window. Per CZL-103 tuning, severity-based enforcement: kernel/governance=deny, tests/docs=warn, content=info."
    rationale: "CZL-103 empirical cross-validation (2026-04-16) — Original root_cause_fix_required had 87% FP rate (203 total, 27 TP, 176 FP) due to lack of severity classification. TUNING: (1) Add recurrence_threshold=2 (must appear ≥2 times in 48h to escalate to deny), (2) Add severity_map: kernel/governance=deny, tests=warn, docs/content=info. 7-day corpus: 87% warning/warn → 13% actually need deny enforcement. Threshold now context-aware to reduce false positives while maintaining high-severity coverage."
    dry_run_until: null  # Immediate enforcement with recurrence_threshold=2
    created_at: "2026-04-16T20:00:00Z"
    recurrence_threshold: 2  # Must appear ≥2 times in 48h to escalate to deny
    severity_map:
      kernel/: deny
      governance/: deny
      tests/: warn
      docs/: info
      content/: info
    tuning_decision: "Add recurrence_threshold=2 + severity_map (kernel/governance=deny, tests/docs=warn/info). 87% FP rate → target ≤20% FP via context-aware severity routing."
    cross_validation_report: "reports/governance/enforcement_threshold_cross_validation_20260416.md"

  - name: document_requires_execution_plan
    pattern: "(?i)\\.md.*\\b(will|plan to|TODO|next step|action item)\\b"
    mode: deny
    message: "Document contains execution plan language but may lack actionable follow-up: '{matched_phrase}'. Per CZL-103 tuning, exempt paths: reports/autonomous/, knowledge/archive/, memory/, reports/drift_hourly/. Requires future-tense marker ('will', 'plan to', 'TODO') in doc content to trigger."
    rationale: "CZL-103 empirical cross-validation (2026-04-16) — Original document_requires_execution_plan had 59% FP rate (85 total, 35 TP, 50 FP) due to triggering on all .md creation without context. TUNING: (1) Exempt archive/reference paths (reports/autonomous/, knowledge/archive/, memory/, reports/drift_hourly/), (2) Require future-tense verbs in content ('will', 'plan to', 'TODO') not just doc creation. 41% TP rate acceptable but needs scope narrowing to reduce warning noise from already-complete execution reports."
    dry_run_until: 1776499200  # 2026-04-18T08:00:00Z — 48h observation period
    dry_run_rationale: "48h warn mode (AI 1 day ≈ human 1 year) allows pattern validation. Auto-promote to deny after 48h if FP rate drops below 30%."
    created_at: "2026-04-16T20:00:00Z"
    exempt_paths:
      - reports/autonomous/
      - knowledge/archive/
      - memory/
      - reports/drift_hourly/
    require_future_tense_marker: true  # Must contain "TODO", "will", "plan to" in content
    tuning_decision: "Exempt archive paths + require future-tense markers. 59% FP rate → target ≤30% FP via scope refinement (planning docs vs completed reports)."
    cross_validation_report: "reports/governance/enforcement_threshold_cross_validation_20260416.md"

  - name: omission_governance
    pattern: "(?i)\\b(omission|missed|skipped|forgot|didn't)\\b"
    mode: warn
    message: "Omission detected: '{matched_phrase}'. Per CZL-103 tuning, escalate only if ≥3 omissions in 24h window. Current mode: warn. Escalation threshold: 3/24h. Deny threshold: 5/24h (auto-promote after 7-day warn period)."
