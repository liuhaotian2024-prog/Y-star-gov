# ForgetGuard Rules — Schema v0.5 (Behavioral Governance, post-purge 2026-04-25)
#
# ============================================================================
# DESIGN PRINCIPLE: This file enforces ACTIONS, not WORDS.
# ============================================================================
#
# Every rule below uses STRUCTURED CONDITIONS over typed event fields.
# Keyword/regex matching against payload text is structurally forbidden —
# the loader (forget_guard.py) raises ForgetGuardSchemaError on startup if
# any rule contains a `pattern:` field or omits `type: structured`.
#
# Why this is enforced structurally:
#   v0.42 used keyword bag-of-words matching at 60% threshold. Rules like
#   `pattern: "ceo task eng-"` triggered on ANY content containing those
#   words, including agents writing role-architecture documents or
#   discussing the dispatch process. 31 of 35 rules in v0.42 had this
#   defect. Repeated cleanup attempts kept failing because under cognitive
#   pressure, contributors (human and AI) regrew keyword blacklists at the
#   first sign of a new failure — they could not keep "speech ≠ behavior"
#   in working memory while debugging.
#
#   The fix is mechanical: the engine refuses to load keyword rules. You
#   cannot regrow what the parser will not accept.
#
# ============================================================================
# WHAT BELONGS HERE vs WHAT BELONGS ELSEWHERE
# ============================================================================
#
# BELONGS HERE (runtime hook, structured conditions):
#   - "Sub-agent attempts git push" → check tool_name + agent_role + parsed
#     command tokens. NOT by grepping for "git push" in any text.
#   - "Sub-agent receipt has tool_uses count diverging from metadata" →
#     check structured numeric fields claimed_tool_uses vs
#     actual_tool_uses_from_metadata. NOT by regex on receipt text.
#   - "File written outside agent's allowed write scope" → check path against
#     allowlist. NOT by reading file contents.
#
# BELONGS ELSEWHERE (NOT in this file):
#   - "Reply contains forbidden phrasing" → semantic audit, not runtime hook.
#   - "Document discusses governance changes" → human review, not auto-block.
#   - "Agent expressed intent to defer" → that is a thought, not an action.
#     Thoughts are not governable in this layer.
#   - "Receipt missing required structural section" → schema validator on
#     the parsed receipt object, not text grep on the rendered text.
#
# ============================================================================
# CONDITION GRAMMAR (forget_guard.py _check_one_condition)
# ============================================================================
#
#   <field>: value                    →  context[field] == value
#   <field>_in: [v1, v2, ...]         →  context[field] in list
#   <field>_under_any: [p1, p2, ...]  →  context[field].startswith(any prefix)
#   has_field: name                   →  context[name] is non-empty
#   command_parsed_first_token: x     →  shlex.split(command)[0] == x
#   command_parsed_subcommand_in: [.] →  shlex.split(command)[1] in list
#   mismatch_metric: <python_expr>    →  eval expr on context (safe builtins)
#   check: <named_check>              →  call _NAMED_CHECKS[name](context)
#   grace_window_minutes: N           →  advisory metadata only (always True)
#
# All conditions in a rule's `conditions:` dict must hold (AND).
#
# ============================================================================

rules:
  # =====================================================================
  # Rule 1: Unauthorized git write operations through tool layer
  # =====================================================================
  # Intent: All git write operations (commit/push/reset/merge/rebase/...)
  #         should go through the human or top-level coordinator, not be
  #         executed directly via the agent tool layer. This preserves a
  #         single committer for repo state and prevents uncoordinated
  #         history mutation by sub-agents.
  #
  # Trigger: bash_command tool call where the command, when shell-parsed,
  #          starts with `git <write-subcommand>`. The fact that the
  #          command goes through the agent tool layer (Bash tool) is itself
  #          the signal — humans run git directly in shell, not through this
  #          hook path.
  #
  # NOT triggered:
  #   - Agent writing markdown that mentions git push (speech)
  #   - Agent reading git status / git log / git diff (read operations)
  #   - Human running git commands in their own shell (does not go through
  #     this hook)
  #   - Agent pasting a code example that contains "git commit"
  #
  # Note on agent identity: this rule does NOT depend on agent_id or
  # agent_role for triggering. The hook layer's identity tracking is
  # imperfect (active_agent marker file races between concurrent sub-agents),
  # so depending on it would create false negatives. Tool-level activity is
  # the reliable signal.
  - name: unauthorized_git_write_via_tool
    type: structured
    conditions:
      tool_name_in: [bash_command, Bash, bash]
      command_parsed_first_token: git
      command_parsed_subcommand_in:
        - commit
        - push
        - add
        - reset
        - merge
        - rebase
        - tag
        - cherry-pick
        - revert
        - "push --force"
    mode: deny
    message: |
      Git write operation via tool layer denied. Sub-agents must produce
      receipts and let the human or coordinator commit. Use a return-receipt
      describing the file changes; do not run git write commands through
      the agent tool path.
    rationale: |
      AGENTS.md hierarchy discipline: sub-agents do not own repo history.
      Single committer prevents conflicting concurrent mutations and preserves
      audit chain integrity. This is a behavioral rule (matches actual command
      execution at the tool layer), not a speech rule (does not block any
      discussion of git in markdown, comments, or strings).
    created_at: "2026-04-25T07:40:00Z"

  # =====================================================================
  # Rule 2: Sub-agent receipt tool_uses count diverges from metadata
  # =====================================================================
  # Intent: When a sub-agent returns a receipt self-reporting "tool_uses: N"
  #         and the actual count from MCP/Agent metadata is M, large
  #         |N - M| indicates either fabrication (over-claim) or omission
  #         (under-claim). Both undermine receipt-honesty. This rule fires
  #         on the structured numeric difference, not on receipt text.
  #
  # Trigger: sub_agent_return event where both claimed_tool_uses and
  #          actual_tool_uses_from_metadata are present and differ by >= 2.
  #
  # NOT triggered:
  #   - Agent writing a doc that mentions tool_uses
  #   - Agent quoting prior tool_uses values
  #   - Sub-agent return without numeric tool_uses fields (caller must
  #     provide both for this rule to evaluate)
  #
  # Note: severity tier (warn vs deny) is handled at the caller layer based
  #       on percentage drift; this rule simply flags the structural
  #       mismatch. Caller can downgrade to warn for small diffs.
  - name: subagent_receipt_tool_uses_mismatch
    type: structured
    conditions:
      event_type: sub_agent_return
      has_field: claimed_tool_uses
      mismatch_metric: "abs((claimed_tool_uses or 0) - (actual_tool_uses_from_metadata or 0)) >= 2"
    mode: warn
    message: |
      Sub-agent {agent_id} reported tool_uses={claimed} but metadata shows
      {actual} (diff={diff}). Investigate before trusting the receipt.
    rationale: |
      Receipt-honesty is foundational to delegation trust. Discrepancies
      indicate either fabrication or measurement bug; both warrant inspection.
      Structural numeric check, not text matching — discussions of tool_uses
      in documents do not trigger.
    created_at: "2026-04-25T07:40:00Z"

  # =====================================================================
  # Rule 3: Artifact written to archival scope but not registered in index
  # =====================================================================
  # Intent: Files written under reports/, knowledge/, products/, content/,
  #         governance/ should appear in ARCHIVE_INDEX so they are
  #         discoverable in subsequent sessions. Loose artifacts get lost
  #         and waste future tokens re-discovering them.
  #
  # Trigger: file_write_committed event where the path falls under archival
  #          scope AND a named check confirms the path is not yet in
  #          ARCHIVE_INDEX after a grace window.
  #
  # Mode: audit. This is observation only — does not block writes. CEO
  #        decides whether to register the artifact or explain why ephemeral.
  #
  # NOT triggered:
  #   - Writing a doc that discusses the archival process
  #   - Writing within the grace window (ephemeral working files)
  #   - Writing outside archival scope (e.g., scratch dirs, /tmp)
  - name: archival_artifact_not_indexed
    type: structured
    conditions:
      event_type: file_write_committed
      path_under_any:
        - reports/
        - knowledge/
        - products/
        - content/
        - governance/
      grace_window_minutes: 30
      check: file_path_not_in_archive_index
    mode: audit
    message: |
      Artifact {path} written to archival scope but not in ARCHIVE_INDEX
      after grace window. Consider registering it or explaining why ephemeral.
    rationale: |
      Improves cross-session discoverability without blocking legitimate work.
      Audit-only mode: never blocks, never warns, just records for review.
    created_at: "2026-04-25T07:40:00Z"
